<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multiplayer Tic Tac Toe - No Firebase</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Teko:wght@500;700&display=swap');
        body { background: #111; color: white; font-family: 'Teko', sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        h1 { font-size: 3rem; color: #00f3ff; text-shadow: 0 0 10px #00f3ff; margin-bottom: 10px; }
        #lobby, #game-area { text-align: center; background: rgba(255, 255, 255, 0.05); padding: 30px; border-radius: 15px; border: 1px solid #333; width: 90%; max-width: 400px; }
        #game-area { display: none; flex-direction: column; }
        input { padding: 10px; font-size: 1.2rem; width: 80%; text-align: center; border-radius: 5px; border: none; margin-bottom: 15px; background: #222; color: white; border: 1px solid #444; }
        .main-btn { padding: 10px 20px; font-size: 1.2rem; font-family: 'Teko', sans-serif; cursor: pointer; border: none; border-radius: 5px; margin: 5px; transition: 0.2s; }
        .btn-create { background: #00f3ff; color: black; }
        .btn-join { background: #ff0055; color: white; }
        .board { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; background: #222; padding: 10px; border-radius: 10px; margin: 20px 0; }
        .cell { width: 80px; height: 80px; background: #333; display: flex; align-items: center; justify-content: center; font-size: 3rem; cursor: pointer; transition: 0.2s; }
        .cell.X { color: #00f3ff; text-shadow: 0 0 10px #00f3ff; }
        .cell.O { color: #ff0055; text-shadow: 0 0 10px #ff0055; }
        #statusMsg { font-size: 1.5rem; margin-bottom: 10px; color: #00f3ff; }
        /* Chat Style */
        .chat-box { background: #1a1a1a; border: 1px solid #333; border-radius: 10px; height: 150px; display: flex; flex-direction: column; margin-top: 15px; }
        #chatMsgs { flex-grow: 1; overflow-y: auto; padding: 10px; font-family: sans-serif; font-size: 0.9rem; text-align: left; }
        .msg { margin-bottom: 5px; padding: 5px 10px; border-radius: 5px; max-width: 80%; }
        .msg-me { background: #00f3ff; color: black; align-self: flex-end; margin-left: auto; }
        .msg-opp { background: #333; color: white; }
        .chat-input-area { display: flex; border-top: 1px solid #333; }
        .chat-input { flex-grow: 1; background: transparent; border: none; color: white; padding: 8px; font-size: 1rem; }
        #restartBtn { display: none; background: #00ff88; color: black; padding: 10px; border-radius: 5px; border: none; font-weight: bold; cursor: pointer; margin-top: 10px; }
    </style>
</head>
<body>

    <h1>TIC TAC TOE ONLINE</h1>

    <div id="lobby">
        <input type="text" id="nameInput" placeholder="Enter Your Name">
        <button class="main-btn btn-create" onclick="createRoom()">Create Room</button>
        <p>OR</p>
        <input type="text" id="roomInput" placeholder="Enter 4 Digit Code">
        <button class="main-btn btn-join" onclick="joinRoom()">Join Room</button>
    </div>

    <div id="game-area">
        <div id="statusMsg">Waiting...</div>
        <div class="board">
            <div class="cell" onclick="sendMove(0)" id="c0"></div>
            <div class="cell" onclick="sendMove(1)" id="c1"></div>
            <div class="cell" onclick="sendMove(2)" id="c2"></div>
            <div class="cell" onclick="sendMove(3)" id="c3"></div>
            <div class="cell" onclick="sendMove(4)" id="c4"></div>
            <div class="cell" onclick="sendMove(5)" id="c5"></div>
            <div class="cell" onclick="sendMove(6)" id="c6"></div>
            <div class="cell" onclick="sendMove(7)" id="c7"></div>
            <div class="cell" onclick="sendMove(8)" id="c8"></div>
        </div>
        
        <div style="color: yellow;">Room: <span id="roomDisp">---</span></div>
        <button id="restartBtn" onclick="requestRematch()">Request Rematch</button>

        <div class="chat-box">
            <div id="chatMsgs"></div>
            <div class="chat-input-area">
                <input type="text" id="chatInput" class="chat-input" placeholder="Chat...">
                <button onclick="sendChat()" style="background:#00f3ff; border:none; padding:10px;">Send</button>
            </div>
        </div>
    </div>

    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>

    <script>
        // REPLACE THIS WITH YOUR RENDER URL
        const socket = io('https://testing-jmd2.onrender.com'); 

        let myName = "";
        let roomId = "";
        let mySymbol = "";
        let isMyTurn = false;

        function createRoom() {
            myName = document.getElementById('nameInput').value || "Player";
            roomId = Math.floor(1000 + Math.random() * 9000).toString();
            socket.emit('joinRoom', { roomId, playerName: myName });
            showGameUI();
        }

        function joinRoom() {
            myName = document.getElementById('nameInput').value || "Player";
            roomId = document.getElementById('roomInput').value;
            if(roomId.length !== 4) return alert("Enter 4 digits!");
            socket.emit('joinRoom', { roomId, playerName: myName });
            showGameUI();
        }

        function showGameUI() {
            document.getElementById('lobby').style.display = 'none';
            document.getElementById('game-area').style.display = 'flex';
            document.getElementById('roomDisp').innerText = roomId;
        }

        // LISTENERS
        socket.on('init', (data) => {
    mySymbol = data.symbol;
    if (mySymbol === 'X') {
        document.getElementById('statusMsg').innerText = "Room Created! Waiting for Opponent...";
    } else {
        document.getElementById('statusMsg').innerText = "Connected! Player X's Turn.";
    }
});


        socket.on('updateBoard', (data) => {
            data.board.forEach((val, i) => {
                const cell = document.getElementById('c' + i);
                cell.innerText = val;
                cell.className = 'cell ' + val;
            });

            if (data.status === 'playing') {
                isMyTurn = (data.turn === mySymbol);
                document.getElementById('statusMsg').innerText = isMyTurn ? "YOUR TURN" : "Opponent's Turn";
                document.getElementById('statusMsg').style.color = isMyTurn ? "#00f3ff" : "#aaa";
            } else {
                document.getElementById('restartBtn').style.display = 'block';
                document.getElementById('statusMsg').innerText = data.status === 'draw' ? "DRAW!" : (data.winner === mySymbol ? "YOU WON! 🎉" : "YOU LOST! 💀");
            }
        });

        socket.on('newChatMessage', (data) => {
            const div = document.createElement('div');
            div.className = 'msg ' + (data.sender === myName ? 'msg-me' : 'msg-opp');
            div.innerText = data.sender + ": " + data.text;
            const container = document.getElementById('chatMsgs');
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
        });

        // ACTIONS
        function sendMove(i) {
            if (!isMyTurn) return;
            socket.emit('makeMove', { roomId, index: i });
        }

        function sendChat() {
            const input = document.getElementById('chatInput');
            if (input.value.trim() === "") return;
            socket.emit('chatMessage', { roomId, msg: input.value, sender: myName });
            input.value = "";
        }

        function requestRematch() {
            socket.emit('requestRematch', { roomId });
            document.getElementById('restartBtn').innerText = "Request Sent...";
            document.getElementById('restartBtn').disabled = true;
        }

        socket.on('gameRestarted', () => {
            document.getElementById('restartBtn').style.display = 'none';
            document.getElementById('restartBtn').innerText = "Request Rematch";
            document.getElementById('restartBtn').disabled = false;
        });
    </script>
</body>
</html>
