<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quick Mail Sender</title>
    <style>
        body { background: #111; color: #00f3ff; font-family: sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .card { background: #222; padding: 20px; border-radius: 10px; border: 1px solid #00f3ff; width: 300px; box-shadow: 0 0 15px #00f3ff; }
        input, textarea { width: 100%; padding: 10px; margin: 10px 0; background: #333; border: 1px solid #444; color: white; border-radius: 5px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background: #00f3ff; border: none; font-weight: bold; cursor: pointer; border-radius: 5px; transition: 0.3s; }
        button:hover { background: #00d4dd; }
    </style>
</head>
<body>
    <div class="card">
        <h2>Send Email</h2>
        <input type="email" id="to" placeholder="To (Receiver Email)">
        <input type="text" id="subject" placeholder="Subject">
        <textarea id="text" rows="4" placeholder="Your Message"></textarea>
        <button onclick="sendMail()">Send Message</button>
    </div>

    <script>
        async function sendMail() {
            const data = {
                to: document.getElementById('to').value,
                subject: document.getElementById('subject').value,
                text: document.getElementById('text').value
            };

            const btn = document.querySelector('button');
            btn.innerText = "Sending...";
            btn.disabled = true;

            try {
                // Aapka Render URL
                const response = await fetch('https://testing-jmd2.onrender.com/send-email', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });

                if (response.ok) {
                    alert("Message sent!");
                    window.location.href = "thankyou.html";
                } else {
                    alert("Failed to send email.");
                    btn.innerText = "Send Message";
                    btn.disabled = false;
                }
            } catch (err) {
                alert("Server Error!");
                btn.innerText = "Send Message";
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
